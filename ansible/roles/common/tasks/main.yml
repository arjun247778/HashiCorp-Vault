---
- name: Update apt repository cache
  apt:
    update_cache: yes
    cache_valid_time: 3600

- name: Install system dependencies
  apt:
    name:
      - unzip
      - curl
      - jq
      - git
      - apt-transport-https
      - ca-certificates
      - gnupg
      - software-properties-common
    state: present

- name: Set timezone to UTC
  timezone:
    name: UTC
